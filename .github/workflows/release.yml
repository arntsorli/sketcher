name: Windows Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Set version from release tag
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          npm version $version --no-git-tag-version --allow-same-version
      - run: npm run ci
      - run: npm audit --audit-level=high
      - run: npm run package
      - name: Create SHA256 checksums
        shell: pwsh
        run: |
          Get-ChildItem release -Filter *.exe | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLower()
            "$hash  $($_.Name)" | Add-Content -Path release/SHA256SUMS.txt
          }
      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create $env:GITHUB_REF_NAME release/*.exe release/SHA256SUMS.txt --generate-notes --title "Sketcher $env:GITHUB_REF_NAME"
