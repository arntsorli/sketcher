name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ci
      - run: npm audit --audit-level=high
      - name: Electron runtime smoke
        run: node scripts/smoke.mjs
      - name: Foundation workflow E2E
        run: node scripts/e2e.mjs
      - name: Upload smoke captures on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-captures
          path: artifacts/
          if-no-files-found: ignore
